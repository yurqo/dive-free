# Cloudflare Worker that proxies Strava token exchange/refresh for DiveFree.
# Deploy with `npm run deploy` (or via Workers Builds / GitHub Actions).
name = "dive-free"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Public, non-secret Worker host (must match StravaConfig.proxyBaseURL in the
# app). A custom_domain route is a bare hostname — no path or `/*`. The zone
# must live on this Cloudflare account.
[[routes]]
pattern = "strava.divefree.software-engineer.ing"
custom_domain = true

# Public site host: App Store static pages (GET /privacy, GET /support) plus the
# Live Activity push-to-start relay (POST /live-activity/start, #18). The Worker
# routes by host, so /token & /refresh do NOT answer here — they're on the
# strava.* host above. Requires the zone on this account and no pre-existing DNS
# record for this hostname.
[[routes]]
pattern = "divefree.software-engineer.ing"
custom_domain = true

[vars]
# Optional override of Strava's token endpoint (handy for testing).
STRAVA_TOKEN_URL = "https://www.strava.com/oauth/token"

# Secrets are NOT stored here. Set them once and they persist across deploys:
#   npx wrangler secret put STRAVA_CLIENT_ID
#   npx wrangler secret put STRAVA_CLIENT_SECRET
# Live Activity push-to-start (#18) — APNs auth for POST /live-activity/start.
# PIPE the .p8 file into APNS_AUTH_KEY; the interactive prompt only reads one line,
# so a pasted multiline PEM stores just the header (→ 503 bad_key_material):
#   npx wrangler secret put APNS_AUTH_KEY < AuthKey_XXXXXXXXXX.p8
#   npx wrangler secret put APNS_KEY_ID     # 10-char Key ID of that .p8
#   npx wrangler secret put APPLE_TEAM_ID   # 10-char Apple Developer Team ID
