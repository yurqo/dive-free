name: TestFlight

# ─────────────────────────────────────────────────────────────────────────────
# Delivers the app to TestFlight on every `v*` tag (and on manual dispatch).
#
# SAFE BY DEFAULT: the Preflight step fails fast with clear guidance if any
# required secret is missing, so a tag pushed before the secrets/prerequisites
# are configured exits early without attempting (or breaking) a real upload.
#
# See docs/CI_CD.md for the prerequisites (Apple Developer Program, bundle ID,
# App Store Connect app record + API key) and the four repo secrets to add.
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:        # manual runs (use this to validate before tagging)
  push:
    tags: ['v*']            # auto-deliver on version tags like v0.1.0

jobs:
  testflight:
    name: Archive & Upload to TestFlight
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Preflight: fail fast with clear guidance if secrets are missing ──────
      - name: Preflight — verify required secrets
        env:
          KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY:   ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          TEAM_ID:   ${{ secrets.TEAM_ID }}
        run: |
          missing=()
          [[ -z "$KEY_ID"    ]] && missing+=("APP_STORE_CONNECT_KEY_ID")
          [[ -z "$ISSUER_ID" ]] && missing+=("APP_STORE_CONNECT_ISSUER_ID")
          [[ -z "$API_KEY"   ]] && missing+=("APP_STORE_CONNECT_API_KEY")
          [[ -z "$TEAM_ID"   ]] && missing+=("TEAM_ID")

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "❌ The following required secrets are not set:"
            for s in "${missing[@]}"; do echo "   • $s"; done
            echo ""
            echo "See docs/CI_CD.md → 'Enabling TestFlight delivery' for setup steps."
            exit 1
          fi
          echo "✅ All required secrets present."

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "~> 26.4"

      - name: Install Tuist (via mise)
        uses: jdx/mise-action@v2

      - name: Generate Xcode workspace
        run: tuist generate --no-open

      # ── Write the App Store Connect API key to disk ──────────────────────────
      - name: Write App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      # ── Archive the iPhone app (embeds Watch app) ────────────────────────────
      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace DiveFree.xcworkspace \
            -scheme DiveFree \
            -destination "generic/platform=iOS" \
            -archivePath DiveFree.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} \
            DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" | xcbeautify

      # ── Export the .ipa ──────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath DiveFree.xcarchive \
            -exportPath DiveFree-export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} | xcbeautify

      # ── Upload to TestFlight ─────────────────────────────────────────────────
      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "DiveFree-export/DiveFree.ipa" \
            --apiKey ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
