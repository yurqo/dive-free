name: Deliver to TestFlight

# ─────────────────────────────────────────────────────────────────────────────
# Manually triggered delivery to TestFlight.
#
# Versioning is automatic: each dispatch ships the next patch, computed from the
# latest vX.Y.Z release tag (1.0.12 → 1.0.13). The build number is DECOUPLED from
# the version — it's the git commit count (monotonic across minor bumps), and the
# delivered version is recorded as a git tag. To jump versions (e.g. a new minor),
# set MARKETING_VERSION in Project.swift higher than the latest tag — CI uses it
# for that one release, then resumes auto-incrementing from there.
#
# SAFE BY DEFAULT: the Preflight step fails fast if any required secret is
# missing. See docs/CI_CD.md.
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:

permissions:
  contents: write          # push the version tag after a successful upload

jobs:
  deliver:
    name: Archive & Upload
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # need full tag history to compute the next version

      # ── Preflight: fail fast with clear guidance if secrets are missing ──────
      - name: Preflight — verify required secrets
        env:
          KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY:   ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          TEAM_ID:   ${{ secrets.APPLE_TEAM_ID }}
          CERT:      ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          CERT_PW:   ${{ secrets.P12_PASSWORD }}
        run: |
          missing=()
          [[ -z "$KEY_ID"    ]] && missing+=("APP_STORE_CONNECT_KEY_ID")
          [[ -z "$ISSUER_ID" ]] && missing+=("APP_STORE_CONNECT_ISSUER_ID")
          [[ -z "$API_KEY"   ]] && missing+=("APP_STORE_CONNECT_API_KEY")
          [[ -z "$TEAM_ID"   ]] && missing+=("APPLE_TEAM_ID")
          [[ -z "$CERT"      ]] && missing+=("BUILD_CERTIFICATE_BASE64")
          [[ -z "$CERT_PW"   ]] && missing+=("P12_PASSWORD")

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "❌ The following required secrets are not set:"
            for s in "${missing[@]}"; do echo "   • $s"; done
            echo ""
            echo "See docs/CI_CD.md → 'Enabling TestFlight delivery' for setup steps."
            exit 1
          fi
          echo "✅ All required secrets present."

      # ── Auto-increment the patch from the latest release tag ─────────────────
      - name: Compute version & build number
        id: version
        run: |
          set -euo pipefail
          # The patch auto-increments from the latest vX.Y.Z release tag, so a
          # plain dispatch ships the next patch with no manual edit. To jump
          # versions (e.g. a new minor), set MARKETING_VERSION in Project.swift
          # higher than the latest tag and CI uses it verbatim that one release.
          # (BSD sort on macOS has no -V, so sort numerically by field.)
          proj=$(grep -m1 -oE '"MARKETING_VERSION": "[0-9]+\.[0-9]+\.[0-9]+"' Project.swift \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          proj=${proj:-1.0.0}
          # `|| true` so no matching tags (first release) doesn't trip set -e.
          tag=$(git tag -l 'v*' | { grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true; } | sed 's/^v//' \
            | sort -t. -k1,1n -k2,2n -k3,3n | tail -n1)
          if [[ -z "$tag" ]]; then
            version="$proj"                              # first release, no tags yet
          else
            highest=$(printf '%s\n%s\n' "$tag" "$proj" | sort -t. -k1,1n -k2,2n -k3,3n | tail -n1)
            if [[ "$proj" != "$tag" && "$highest" == "$proj" ]]; then
              version="$proj"                            # manual override in Project.swift
            else
              IFS=. read -r major minor patch <<<"$tag"
              version="$major.$minor.$((patch + 1))"     # auto patch bump
            fi
          fi
          # Build number is DECOUPLED from the marketing version: use the commit
          # count, which is monotonic across minor bumps. (build=patch would step
          # backwards on a 1.0.x→1.1.0 jump and TestFlight rejects a lower build.)
          build="$(git rev-list --count HEAD)"
          echo "Shipping version $version (build $build)."
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build=$build" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "~> 26.4"

      - name: Install Tuist (via mise)
        uses: jdx/mise-action@v2

      - name: Generate Xcode workspace
        run: tuist generate --no-open

      - name: Write App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      # ── Import the persistent signing certificate into a temp keychain ───────
      # Reuses one stored cert (the BUILD_CERTIFICATE_BASE64 secret) instead of
      # letting -allowProvisioningUpdates mint a fresh "Apple Development" cert on
      # every run, which eventually trips Apple's per-account certificate limit.
      # Provisioning profiles are still managed automatically via the API key.
      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/signing_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          # Make the temp keychain searchable so codesign finds the identity.
          # (System keychain is always searched, so the WWDR/root chain resolves.)
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"
          echo "✅ Imported signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # ── Archive (embeds the Watch app) with the computed version/build ───────
      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace DiveFree.xcworkspace \
            -scheme DiveFree \
            -destination "generic/platform=iOS" \
            -archivePath DiveFree.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build }}" | xcbeautify

      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath DiveFree.xcarchive \
            -exportPath DiveFree-export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} | xcbeautify

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "DiveFree-export/DiveFree.ipa" \
            --apiKey ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      # ── Record the delivered version as a tag (one tag per marketing version) ─
      - name: Tag delivered version
        if: success()
        run: |
          set -euo pipefail
          tag="v${{ steps.version.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; skipping (bump the patch for a new release)."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$tag"
            git push origin "$tag"
            echo "Tagged $tag (build ${{ steps.version.outputs.build }})."
          fi
