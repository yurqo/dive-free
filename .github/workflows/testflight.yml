name: Deliver to TestFlight

# ─────────────────────────────────────────────────────────────────────────────
# Manually triggered delivery to TestFlight.
#
# The marketing version is the single source of truth in Project.swift
# (MARKETING_VERSION) — this workflow reads it, so what's in the repo is exactly
# what TestFlight shows. To ship a new version, bump MARKETING_VERSION in
# Project.swift. The build number is the workflow run number, so every upload is
# unique and increasing; the delivered "version (build)" is recorded as a tag.
#
# SAFE BY DEFAULT: the Preflight step fails fast if any required secret is
# missing. See docs/CI_CD.md.
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:

permissions:
  contents: write          # push the version tag after a successful upload

jobs:
  deliver:
    name: Archive & Upload
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # need full tag history to compute the next version

      # ── Preflight: fail fast with clear guidance if secrets are missing ──────
      - name: Preflight — verify required secrets
        env:
          KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY:   ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          TEAM_ID:   ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          [[ -z "$KEY_ID"    ]] && missing+=("APP_STORE_CONNECT_KEY_ID")
          [[ -z "$ISSUER_ID" ]] && missing+=("APP_STORE_CONNECT_ISSUER_ID")
          [[ -z "$API_KEY"   ]] && missing+=("APP_STORE_CONNECT_API_KEY")
          [[ -z "$TEAM_ID"   ]] && missing+=("APPLE_TEAM_ID")

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "❌ The following required secrets are not set:"
            for s in "${missing[@]}"; do echo "   • $s"; done
            echo ""
            echo "See docs/CI_CD.md → 'Enabling TestFlight delivery' for setup steps."
            exit 1
          fi
          echo "✅ All required secrets present."

      # ── Read the marketing version from Project.swift; build = run number ────
      - name: Compute version & build number
        id: version
        run: |
          set -euo pipefail
          version=$(grep -m1 -oE '"MARKETING_VERSION": "[0-9]+\.[0-9]+\.[0-9]+"' Project.swift \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [[ -z "$version" ]]; then
            echo "❌ Could not read MARKETING_VERSION from Project.swift." >&2
            exit 1
          fi
          echo "Shipping version $version (build ${{ github.run_number }}) from Project.swift."
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "~> 26.4"

      - name: Install Tuist (via mise)
        uses: jdx/mise-action@v2

      - name: Generate Xcode workspace
        run: tuist generate --no-open

      - name: Write App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      # ── Archive (embeds the Watch app) with the computed version/build ───────
      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace DiveFree.xcworkspace \
            -scheme DiveFree \
            -destination "generic/platform=iOS" \
            -archivePath DiveFree.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build }}" \
            STRAVA_CLIENT_SECRET="${{ secrets.STRAVA_CLIENT_SECRET }}" | xcbeautify

      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath DiveFree.xcarchive \
            -exportPath DiveFree-export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} | xcbeautify

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "DiveFree-export/DiveFree.ipa" \
            --apiKey ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      # ── Record the delivered version+build as a tag (unique per upload) ──────
      - name: Tag delivered version
        if: success()
        run: |
          set -euo pipefail
          tag="v${{ steps.version.outputs.version }}-build.${{ steps.version.outputs.build }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"
          echo "Tagged $tag."
