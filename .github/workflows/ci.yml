name: CI

on:
  # Run on every PR so the required "Build & Test" check always reports a status.
  # Docs-only changes (docs/**, *.md, the TestFlight workflow) fast-skip the heavy
  # steps below via the `changes` gate but the job still succeeds — so docs-only
  # PRs aren't blocked by a never-reported required check, while non-docs PRs still
  # get the full build/test (and we don't burn a full macOS build on doc edits).
  pull_request:

# Cancel any in-progress run for the same branch when a new commit arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need base..head history to detect changed files

      # Decide whether this PR touches anything other than docs. Fail-safe: if the
      # changed-file list can't be determined, run the full build.
      - name: Detect non-docs changes
        id: changes
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          files=$(git diff --name-only "$base...$head" 2>/dev/null) || files=""
          if [ -z "$files" ] || printf '%s\n' "$files" | grep -qvE '^(docs/|.*\.md$|\.github/workflows/testflight\.yml$)'; then
            code=true
          else
            code=false
          fi
          echo "code=$code" >> "$GITHUB_OUTPUT"
          printf 'Run full build: %s\nChanged files:\n%s\n' "$code" "$files"

      # Pin the Xcode minor version; patch is resolved automatically.
      - name: Select Xcode
        if: steps.changes.outputs.code == 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "~> 26.4"

      # Installs Tuist at the version pinned in mise.toml.
      - name: Install Tuist (via mise)
        if: steps.changes.outputs.code == 'true'
        uses: jdx/mise-action@v2

      - name: Cache Tuist binaries
        if: steps.changes.outputs.code == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.tuist/Cache
          key: tuist-${{ runner.os }}-${{ hashFiles('Project.swift') }}
          restore-keys: tuist-${{ runner.os }}-

      # Regenerate the Xcode workspace from Project.swift.
      # The generated .xcodeproj/.xcworkspace are git-ignored; always regenerate on CI.
      - name: Generate Xcode workspace
        if: steps.changes.outputs.code == 'true'
        run: tuist generate --no-open

      # Discover the first available iPhone simulator so the test step is
      # resilient to the exact device names changing between runner images.
      - name: Select iOS simulator
        if: steps.changes.outputs.code == 'true'
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -m1 -oE 'iPhone [0-9][^(]+' | xargs)
          echo "Selected simulator: $DEVICE"
          echo "SIM_DEVICE=$DEVICE" >> "$GITHUB_ENV"

      # Run the unit-test suite for every framework package.
      # Each produces a .xcresult bundle; on failure all bundles are uploaded as artifacts.
      - name: Test — Domain
        if: steps.changes.outputs.code == 'true'
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace DiveFree.xcworkspace \
            -scheme Domain \
            -destination "platform=iOS Simulator,name=$SIM_DEVICE" \
            -resultBundlePath TestResults-Domain.xcresult \
            CODE_SIGNING_ALLOWED=NO | xcbeautify

      - name: Test — Persistence
        if: steps.changes.outputs.code == 'true'
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace DiveFree.xcworkspace \
            -scheme Persistence \
            -destination "platform=iOS Simulator,name=$SIM_DEVICE" \
            -resultBundlePath TestResults-Persistence.xcresult \
            CODE_SIGNING_ALLOWED=NO | xcbeautify

      - name: Test — Sensors
        if: steps.changes.outputs.code == 'true'
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace DiveFree.xcworkspace \
            -scheme Sensors \
            -destination "platform=iOS Simulator,name=$SIM_DEVICE" \
            -resultBundlePath TestResults-Sensors.xcresult \
            CODE_SIGNING_ALLOWED=NO | xcbeautify

      - name: Test — Sync
        if: steps.changes.outputs.code == 'true'
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace DiveFree.xcworkspace \
            -scheme Sync \
            -destination "platform=iOS Simulator,name=$SIM_DEVICE" \
            -resultBundlePath TestResults-Sync.xcresult \
            CODE_SIGNING_ALLOWED=NO | xcbeautify

      - name: Test — Strava
        if: steps.changes.outputs.code == 'true'
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace DiveFree.xcworkspace \
            -scheme Strava \
            -destination "platform=iOS Simulator,name=$SIM_DEVICE" \
            -resultBundlePath TestResults-Strava.xcresult \
            CODE_SIGNING_ALLOWED=NO | xcbeautify

      # Build the Watch app (no simulator suffix needed; SDK is present on macos-26).
      # EXCLUDED_ARCHS=x86_64: macos-26 runners are Apple Silicon; the x86_64 slice is
      # unused and causes linker failures when dependencies only produce an arm64 slice.
      - name: Build — DiveFreeWatch
        if: steps.changes.outputs.code == 'true'
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace DiveFree.xcworkspace \
            -scheme DiveFreeWatch \
            -destination "generic/platform=watchOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            EXCLUDED_ARCHS=x86_64 | xcbeautify

      # Build the iPhone app (embeds the Watch app — requires watchOS SDK to be present).
      # EXCLUDED_ARCHS=x86_64: same reason as above; generic/platform builds all archs by
      # default, but the arm64-only Domain framework causes a link failure for x86_64.
      - name: Build — DiveFree (iPhone)
        if: steps.changes.outputs.code == 'true'
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace DiveFree.xcworkspace \
            -scheme DiveFree \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            EXCLUDED_ARCHS=x86_64 | xcbeautify

      # Upload xcresult bundles on failure so you can open them in Xcode locally.
      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "*.xcresult"
          if-no-files-found: ignore
